name: Public package CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  package:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install build and test dependencies
        run: python -m pip install --upgrade build twine detect-secrets==1.5.0 '.[dev]'
      - name: Scan the public tree for secrets
        shell: bash
        run: |
          detect-secrets scan --all-files --exclude-files '(^|/)\.git/|RELEASE_PROVENANCE\.json$' > /tmp/detect-secrets.json
          python -c 'import json; data=json.load(open("/tmp/detect-secrets.json")); assert not data["results"], data["results"]'
      - name: Run package and MCP tests
        run: python -m pytest -q
      - name: Build distributions
        run: python -m build
      - name: Validate distributions
        run: python -m twine check dist/*
      - name: Install and smoke the exact wheel
        shell: bash
        run: |
          wheel="$(pwd)/$(find dist -maxdepth 1 -name '*.whl' -print -quit)"
          python -m venv /tmp/esheria-public-package
          cd /tmp
          /tmp/esheria-public-package/bin/python -m pip install --force-reinstall "$wheel"
          /tmp/esheria-public-package/bin/esheria --version
          /tmp/esheria-public-package/bin/esheria --help
          /tmp/esheria-public-package/bin/esheria mcp serve --help
          /tmp/esheria-public-package/bin/esheria-mcp --help
          /tmp/esheria-public-package/bin/python -m pip check
